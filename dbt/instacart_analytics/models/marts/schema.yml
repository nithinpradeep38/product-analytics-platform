version: 2

models:
  - name: fct_orders
    description: "Fact table - one row per order"
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: order_hour_of_day
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 23

  - name: dim_users
    description: "User dimension - one row per user"
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension with aisle and department"
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_date
    description: "Calendar date dimension"
    columns:
      - name: date_key
        data_tests:
          - unique
          - not_null