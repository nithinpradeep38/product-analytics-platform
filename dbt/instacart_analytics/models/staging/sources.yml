version: 2

sources:
  - name: instacart
    database: ANALYTICS_DEV
    schema: RAW
    description: "Raw Instacart data loaded from Kaggle CSVs via Python ingestion script"
    
    tables:
      - name: orders
        description: "One row per order. Contains user, timing, and sequence information."
        columns:
          - name: order_id
            description: "Primary key - unique identifier for each order"
          - name: user_id
            description: "Foreign key to the user who placed the order"
          - name: order_number
            description: "Sequence number of this order for the user - 1 is their first ever order"
          - name: order_dow
            description: "Day of week the order was placed - 0=Sunday, 6=Saturday"
          - name: order_hour_of_day
            description: "Hour of day the order was placed - 0 to 23"
          - name: days_since_prior_order
            description: "Days since this user's previous order - null for first orders"
          - name: order_date
            description: "Synthesized calendar date derived from days_since_prior_order"

      - name: order_products
        description: "One row per product per order. Union of prior and train datasets."
        columns:
          - name: order_id
            description: "Foreign key to orders table"
          - name: product_id
            description: "Foreign key to products table"
          - name: add_to_cart_order
            description: "Sequence in which this product was added to the cart"
          - name: reordered
            description: "1 if this product has been ordered by this user before, 0 if not"

      - name: products
        description: "One row per product - master product list"
        columns:
          - name: product_id
            description: "Primary key - unique product identifier"
          - name: product_name
            description: "Name of the product"
          - name: aisle_id
            description: "Foreign key to aisles table"
          - name: department_id
            description: "Foreign key to departments table"

      - name: aisles
        description: "One row per aisle - 134 aisles total"
        columns:
          - name: aisle_id
            description: "Primary key - unique aisle identifier"
          - name: aisle
            description: "Name of the aisle e.g. fresh vegetables, yogurt"

      - name: departments
        description: "One row per department - 21 departments total"
        columns:
          - name: department_id
            description: "Primary key - unique department identifier"
          - name: department
            description: "Name of the department e.g. produce, dairy eggs"